<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive 8-Segment Donut</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
    }

    .seg-group {
      transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
      cursor: pointer;
    }

    .seg-group:hover path {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <svg
    id="donut"
    viewBox="0 0 500 500"
    xmlns="http://www.w3.org/2000/svg"
    width="460"
    height="460"
    style="overflow: visible;"
  >
    <title>Interactive 8-segment donut</title>
    <desc>Click any segment to pull it out radially. Click again to return it.</desc>

    <defs>
      <!-- Hatch pattern for the highlighted segment (seg 0) -->
      <pattern id="hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="7" stroke="#555" stroke-width="1.2"/>
      </pattern>
    </defs>

    <!--
      8 equal segments, each 45°.
      Start angle: -90° (top), going clockwise.
      Outer radius: 185  |  Inner radius: 105  |  Center: (250, 250)

      Segment boundary points:
        -90°  -> (250, 65)
        -45°  -> (380.81, 119.19)
          0°  -> (435, 250)
         45°  -> (380.81, 380.81)
         90°  -> (250, 435)
        135°  -> (119.19, 380.81)
        180°  -> (65, 250)
        225°  -> (119.19, 119.19)
        270°  -> (250, 65)  [same as -90°]

      Each path: outer arc CW → line in → inner arc CCW → close
    -->

    <!-- Seg 0: -90° to -45° — hatched (highlighted) -->
    <g id="s0">
      <path
        d="M 250,65 A 185,185 0 0,1 380.81,119.19 L 324.25,175.75 A 105,105 0 0,0 250,145 Z"
        fill="url(#hatch)" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Seg 1: -45° to 0° -->
    <g id="s1">
      <path
        d="M 380.81,119.19 A 185,185 0 0,1 435,250 L 355,250 A 105,105 0 0,0 324.25,175.75 Z"
        fill="#e0e0e0" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Seg 2: 0° to 45° -->
    <g id="s2">
      <path
        d="M 435,250 A 185,185 0 0,1 380.81,380.81 L 324.25,324.25 A 105,105 0 0,0 355,250 Z"
        fill="#e0e0e0" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Seg 3: 45° to 90° -->
    <g id="s3">
      <path
        d="M 380.81,380.81 A 185,185 0 0,1 250,435 L 250,355 A 105,105 0 0,0 324.25,324.25 Z"
        fill="#e0e0e0" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Seg 4: 90° to 135° -->
    <g id="s4">
      <path
        d="M 250,435 A 185,185 0 0,1 119.19,380.81 L 175.75,324.25 A 105,105 0 0,0 250,355 Z"
        fill="#e0e0e0" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Seg 5: 135° to 180° -->
    <g id="s5">
      <path
        d="M 119.19,380.81 A 185,185 0 0,1 65,250 L 145,250 A 105,105 0 0,0 175.75,324.25 Z"
        fill="#e0e0e0" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Seg 6: 180° to 225° -->
    <g id="s6">
      <path
        d="M 65,250 A 185,185 0 0,1 119.19,119.19 L 175.75,175.75 A 105,105 0 0,0 145,250 Z"
        fill="#e0e0e0" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Seg 7: 225° to 270° -->
    <g id="s7">
      <path
        d="M 119.19,119.19 A 185,185 0 0,1 250,65 L 250,145 A 105,105 0 0,0 175.75,175.75 Z"
        fill="#e0e0e0" stroke="#555" stroke-width="2"
      />
    </g>

    <!-- Center circle -->
    <circle cx="250" cy="250" r="100" fill="#333"/>

    <!-- Icon placeholder circles at segment midpoints (r=145 from center) -->
    <circle cx="305.5" cy="116"   r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="384"   cy="194.5" r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="384"   cy="305.5" r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="305.5" cy="384"   r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="194.5" cy="384"   r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="116"   cy="305.5" r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="116"   cy="194.5" r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="194.5" cy="116"   r="18" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  </svg>

  <script>
    /*
      For each segment i, the midpoint angle (in degrees, from the positive x-axis) is:
        midDeg = -90 + (i + 0.5) * 45

      The pull translation is computed as:
        dx = cos(midRad) * PULL
        dy = sin(midRad) * PULL

      This ensures every segment moves directly outward along its own radial axis,
      so the gap it leaves is always aligned with its original position.
    */

    const PULL = 24; // pixels to translate outward
    const state = {};

    for (let i = 0; i < 8; i++) {
      const midDeg = -90 + (i + 0.5) * 45;
      const midRad = midDeg * Math.PI / 180;
      const dx = Math.cos(midRad) * PULL;
      const dy = Math.sin(midRad) * PULL;

      const g = document.getElementById('s' + i);
      g.classList.add('seg-group');
      state[i] = false;

      g.addEventListener('click', function () {
        state[i] = !state[i];
        this.style.transform = state[i]
          ? `translate(${dx}px, ${dy}px)`
          : '';
      });
    }
  </script>

</body>
</html>
