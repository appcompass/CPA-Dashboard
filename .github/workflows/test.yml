name: R Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Install R dependencies
        run: make install

      - name: Run tests
        run: make test
