name: R Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install R dependencies
        run: Rscript -e "install.packages(c('shiny', 'testthat'), repos = 'https://cloud.r-project.org')"

      - name: Run tests
        run: Rscript -e "library(testthat); test_dir('tests/testthat', reporter = 'progress')"
