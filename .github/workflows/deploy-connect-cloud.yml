name: Deploy to Posit Connect Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-connect-cloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      POSIT_CONNECT_ACCOUNT: ${{ secrets.POSIT_CONNECT_ACCOUNT }}
      RSCLOUD_CLIENT_ID: ${{ secrets.RSCLOUD_CLIENT_ID }}
      RSCLOUD_CLIENT_SECRET: ${{ secrets.RSCLOUD_CLIENT_SECRET }}
      POSIT_CONNECT_APP_NAME: ${{ vars.POSIT_CONNECT_APP_NAME || 'cpa-dashboard' }}
      POSIT_CONNECT_APP_TITLE: ${{ vars.POSIT_CONNECT_APP_TITLE || 'CPA Dashboard' }}
      CPA_DATA_KEY: ${{ secrets.CPA_DATA_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Install R dependencies
        run: make install

      - name: Run tests before deploy
        run: make test

      - name: Deploy app to Posit Connect Cloud
        run: make deploy
